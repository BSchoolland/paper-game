<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anchor Editor</title>
<style>
  :root {
    --bg: #2a2520;
    --bg-light: #3a3530;
    --panel: #e8dcc8;
    --panel-dark: #d4c4a8;
    --border: #b8a888;
    --ink: #2a2520;
    --ink-muted: #6b6358;
    --accent: #5a7a3a;
    --selected: #c47030;
    --danger: #a03020;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    background: var(--panel-dark);
    padding: 6px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 2px solid var(--border);
    flex-shrink: 0;
  }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .header-group label { font-size: 12px; color: var(--ink-muted); }
  .header select, .header input[type=text] {
    padding: 3px 8px;
    font-size: 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--panel);
    color: var(--ink);
  }
  .header-btn {
    padding: 4px 12px;
    font-size: 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--panel);
    color: var(--ink);
    cursor: pointer;
  }
  .header-btn:hover { background: var(--panel-dark); }
  .header-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .header-btn.primary:hover { background: #4a6a2a; }
  .unsaved-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--selected);
    display: none;
  }
  .unsaved-dot.visible { display: block; }
  .spacer { flex: 1; }

  /* Main layout */
  .main {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* Left panel */
  .left-panel {
    width: 180px;
    background: var(--panel);
    border-right: 2px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }
  .panel-section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-muted);
    padding: 6px 8px 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .frame-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px;
  }
  .frame-group-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--ink-muted);
    padding: 6px 4px 2px;
    text-transform: uppercase;
  }
  .frame-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 6px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    color: var(--ink);
  }
  .frame-item:hover { background: var(--panel-dark); }
  .frame-item.active { background: var(--selected); color: #fff; }
  .frame-item .thumb {
    width: 32px;
    height: 32px;
    object-fit: contain;
    image-rendering: pixelated;
    flex-shrink: 0;
  }
  .frame-item .status {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .frame-item .status.done { background: var(--accent); }
  .frame-item .status.partial { background: var(--selected); }
  .frame-item .status.empty { background: #ccc; }

  /* Center canvas area */
  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg-light);
    min-width: 0;
    position: relative;
  }
  .canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  #mainCanvas {
    image-rendering: pixelated;
    cursor: crosshair;
  }

  /* Right panel */
  .right-panel {
    width: 220px;
    background: var(--panel);
    border-left: 2px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }
  .preview-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .preview-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    padding: 4px;
    min-height: 0;
  }
  .preview-cell {
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: var(--panel-dark);
    border-radius: 4px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .preview-cell-label {
    font-size: 9px;
    text-align: center;
    padding: 2px;
    color: var(--ink-muted);
    font-weight: 600;
    flex-shrink: 0;
  }
  .preview-cell canvas {
    flex: 1;
    width: 100%;
    min-height: 0;
    image-rendering: pixelated;
  }

  /* Item palette in right panel */
  .item-palette {
    border-top: 2px solid var(--border);
    max-height: 200px;
    overflow-y: auto;
    padding: 4px;
  }
  .item-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 3px;
  }
  .item-btn {
    background: var(--panel-dark);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .item-btn:hover { border-color: var(--accent); }
  .item-btn.active { border-color: var(--selected); border-width: 2px; }
  .item-btn img {
    width: 32px;
    height: 32px;
    object-fit: contain;
    image-rendering: pixelated;
  }

  /* Status bar */
  .status-bar {
    background: var(--panel-dark);
    padding: 4px 12px;
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: var(--ink-muted);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* Anchor legend */
  .anchor-legend {
    padding: 4px 8px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: var(--ink-muted);
    padding: 1px 0;
    cursor: pointer;
  }
  .legend-item:hover { color: var(--ink); }
  .legend-item .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Copy anchors modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    min-width: 300px;
  }
  .modal h3 { font-size: 14px; margin-bottom: 8px; }
  .modal select { width: 100%; padding: 4px; margin-bottom: 8px; }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Anchor Editor</h1>
  <div class="header-group">
    <label>Character:</label>
    <input type="text" id="charPath" value="char1" style="width:120px" />
    <button class="header-btn" id="loadBtn">Load</button>
  </div>
  <div class="unsaved-dot" id="unsavedDot" title="Unsaved changes"></div>
  <div class="spacer"></div>
  <button class="header-btn" id="copyAnchorsBtn">Copy from...</button>
  <button class="header-btn primary" id="saveBtn">Save JSON</button>
  <button class="header-btn" id="downloadBtn">Download</button>
  <button class="header-btn" id="downloadAllBtn">Download All</button>
</div>

<div class="main">
  <div class="left-panel">
    <div class="panel-section-label">Frames</div>
    <div class="frame-list" id="frameList"></div>
    <div class="anchor-legend" id="anchorLegend"></div>
  </div>

  <div class="center">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="mainCanvas"></canvas>
    </div>
  </div>

  <div class="right-panel">
    <div class="panel-section-label">Preview (current weapon set)</div>
    <div class="preview-section">
      <div class="preview-grid" id="previewGrid">
        <div class="preview-cell">
          <div class="preview-cell-label">Idle</div>
          <canvas id="prev-idle"></canvas>
        </div>
        <div class="preview-cell">
          <div class="preview-cell-label">Attack</div>
          <canvas id="prev-attack"></canvas>
        </div>
        <div class="preview-cell">
          <div class="preview-cell-label">Hit</div>
          <canvas id="prev-hit"></canvas>
        </div>
        <div class="preview-cell">
          <div class="preview-cell-label">Move</div>
          <canvas id="prev-move"></canvas>
        </div>
      </div>
    </div>
    <div class="panel-section-label" style="display:flex;align-items:center;justify-content:space-between">
      <span>Items (click to add to inventory-idle)</span>
      <button class="header-btn" id="clearItemsBtn" style="font-size:9px;padding:2px 6px">Clear</button>
    </div>
    <div class="item-palette" id="itemPalette"></div>
  </div>
</div>

<div class="status-bar">
  <span id="statusFrame">No frame loaded</span>
  <span id="statusCursor"></span>
  <span id="statusAnchor"></span>
  <span id="statusZoom"></span>
</div>

<div class="modal-overlay" id="copyModal">
  <div class="modal">
    <h3>Copy anchors from another frame</h3>
    <select id="copySource"></select>
    <div class="modal-actions">
      <button class="header-btn" id="copyCancel">Cancel</button>
      <button class="header-btn primary" id="copyConfirm">Copy</button>
    </div>
  </div>
</div>

<script>
// ─── Constants ──────────────────────────────────────────────────────────
const ANCHOR_NAMES = [
  'head', 'chest', 'r_shoulder', 'l_shoulder', 'belt',
  'r_hip', 'l_hip', 'r_hand', 'l_hand', 'r_foot', 'l_foot'
];

const BONES = {
  spine:      { from: 'head',       to: 'chest' },
  torso:      { from: 'chest',      to: 'belt' },
  r_collar:   { from: 'chest',      to: 'r_shoulder' },
  l_collar:   { from: 'chest',      to: 'l_shoulder' },
  r_arm:      { from: 'r_shoulder', to: 'r_hand' },
  l_arm:      { from: 'l_shoulder', to: 'l_hand' },
  r_pelvis:   { from: 'belt',       to: 'r_hip' },
  l_pelvis:   { from: 'belt',       to: 'l_hip' },
  r_leg:      { from: 'r_hip',      to: 'r_foot' },
  l_leg:      { from: 'l_hip',      to: 'l_foot' },
};

const ANCHOR_COLORS = {
  head:       '#e03030',
  chest:      '#d07020',
  belt:       '#d07020',
  r_shoulder: '#3060d0',
  l_shoulder: '#3060d0',
  r_hand:     '#5080e0',
  l_hand:     '#5080e0',
  r_hip:      '#30a040',
  l_hip:      '#30a040',
  r_foot:     '#50c060',
  l_foot:     '#50c060',
};

const BONE_COLORS = {
  spine:    '#d07020',
  torso:    '#d07020',
  r_collar: '#d07020',
  l_collar: '#d07020',
  r_arm:    '#3060d0',
  l_arm:    '#3060d0',
  r_pelvis: '#30a040',
  l_pelvis: '#30a040',
  r_leg:    '#30a040',
  l_leg:    '#30a040',
};

const STATES = ['idle', 'attack', 'hit', 'move'];
const ANCHOR_RADIUS = 15;
const ANCHOR_HIT_RADIUS = 22;

const WEAPON_GROUPS = ['sword', 'dual-wield', 'spear', 'bow', 'staff', 'two-handed'];

function parseFrameKey(key) {
  for (const w of WEAPON_GROUPS) {
    if (key.startsWith(w + '-')) {
      return { group: w, state: key.slice(w.length + 1) };
    }
  }
  if (key === 'inventory-idle') return { group: 'inventory', state: 'idle' };
  const lastDash = key.lastIndexOf('-');
  return {
    group: key.substring(0, lastDash),
    state: key.substring(lastDash + 1),
  };
}

// ─── State ──────────────────────────────────────────────────────────────
let charPath = 'char1';
let frameKeys = [];
let frameImages = {};
let currentFrame = null;
let anchorData = { version: 1, character: '', bones: BONES, frames: {} };
let unsaved = false;
let selectedAnchor = null;
let draggingAnchor = null;
let zoom = 3;
let panX = 0, panY = 0;
let isPanning = false;
let panStart = { x: 0, y: 0, px: 0, py: 0 };
let placedItems = []; // { id, x, y, scale, rotation } in inventory-idle sprite space
let selectedItem = -1;
let draggingItem = null; // { index, offX, offY }
let itemImages = {};
const ITEM_BASE_SCALE = 0.4;

// ─── DOM refs ───────────────────────────────────────────────────────────
const mainCanvas = document.getElementById('mainCanvas');
const ctx = mainCanvas.getContext('2d');
const canvasWrap = document.getElementById('canvasWrap');
const frameList = document.getElementById('frameList');
const unsavedDot = document.getElementById('unsavedDot');

// ─── Image loading ──────────────────────────────────────────────────────
const BASE_URL = '../client/public/sprites';

async function discoverFrames(character) {
  const knownWeapons = ['sword', 'dual-wield', 'spear', 'bow', 'staff', 'two-handed'];
  const knownStates = ['idle', 'attack', 'hit', 'move'];
  const found = [];
  const promises = [];

  for (const weap of knownWeapons) {
    for (const state of knownStates) {
      const key = `${weap}-${state}`;
      const url = `${BASE_URL}/${character}/${key}.webp`;
      promises.push(
        loadImage(url).then(img => {
          if (img) {
            frameImages[key] = img;
            found.push(key);
          }
        })
      );
    }
  }

  const invKey = 'inventory-idle';
  const invUrl = `${BASE_URL}/${character}/${invKey}.png`;
  promises.push(
    loadImage(invUrl).then(img => {
      if (img) {
        frameImages[invKey] = img;
        found.push(invKey);
      }
    })
  );

  await Promise.all(promises);

  found.sort((a, b) => {
    const groupA = parseFrameKey(a).group;
    const groupB = parseFrameKey(b).group;
    if (groupA !== groupB) {
      const idxA = knownWeapons.indexOf(groupA);
      const idxB = knownWeapons.indexOf(groupB);
      const oA = idxA >= 0 ? idxA : 100;
      const oB = idxB >= 0 ? idxB : 100;
      return oA - oB;
    }
    const stateA = parseFrameKey(a).state;
    const stateB = parseFrameKey(b).state;
    return knownStates.indexOf(stateA) - knownStates.indexOf(stateB);
  });

  return found;
}

function loadImage(url) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = url;
  });
}

async function loadItemSprites() {
  try {
    const res = await fetch(`${BASE_URL}/items/manifest.json`);
    const manifest = await res.json();
    const palette = document.getElementById('itemPalette');
    const grid = document.createElement('div');
    grid.className = 'item-grid';

    for (const [id, file] of Object.entries(manifest)) {
      const url = `${BASE_URL}/items/${file}`;
      const img = await loadImage(url);
      if (!img) continue;
      itemImages[id] = img;

      const btn = document.createElement('div');
      btn.className = 'item-btn';
      btn.title = id;
      const imgEl = document.createElement('img');
      imgEl.src = url;
      btn.appendChild(imgEl);
      btn.addEventListener('click', () => addPlacedItem(id));
      grid.appendChild(btn);
    }
    palette.appendChild(grid);
  } catch(e) {
    console.warn('Could not load item sprites:', e);
  }
}

function addPlacedItem(id) {
  if (currentFrame !== 'inventory-idle') {
    if (frameKeys.includes('inventory-idle')) {
      selectFrame('inventory-idle');
    } else {
      alert('inventory-idle frame not found.');
      return;
    }
  }
  ensureFrame('inventory-idle');
  const invFrame = anchorData.frames['inventory-idle'];
  const x = invFrame.width * 0.5;
  const y = invFrame.height * 0.5;
  placedItems.push({ id, x, y, scale: ITEM_BASE_SCALE, rotation: 0 });
  selectedItem = placedItems.length - 1;
  saveItemsToStorage();
  draw();
  drawPreviews();
}

function saveItemsToStorage() {
  try {
    localStorage.setItem(`anchor-editor-items-${charPath}`, JSON.stringify(placedItems));
  } catch(e) {}
}

function loadItemsFromStorage() {
  try {
    const stored = localStorage.getItem(`anchor-editor-items-${charPath}`);
    if (stored) placedItems = JSON.parse(stored);
  } catch(e) {}
}

function clearPlacedItems() {
  placedItems = [];
  selectedItem = -1;
  saveItemsToStorage();
  draw();
  drawPreviews();
}

// ─── Frame list ─────────────────────────────────────────────────────────
function buildFrameList() {
  frameList.innerHTML = '';
  let lastGroup = null;

  for (const key of frameKeys) {
    const { group, state } = parseFrameKey(key);

    if (group !== lastGroup) {
      const label = document.createElement('div');
      label.className = 'frame-group-label';
      label.textContent = group;
      frameList.appendChild(label);
      lastGroup = group;
    }

    const item = document.createElement('div');
    item.className = 'frame-item';
    if (key === currentFrame) item.classList.add('active');
    item.dataset.key = key;

    const img = frameImages[key];
    const thumb = document.createElement('img');
    thumb.className = 'thumb';
    thumb.src = img.src;

    const status = document.createElement('div');
    status.className = 'status ' + getFrameStatus(key);

    const label = document.createElement('span');
    label.textContent = state;

    item.appendChild(thumb);
    item.appendChild(label);
    item.appendChild(status);
    item.addEventListener('click', () => selectFrame(key));
    frameList.appendChild(item);
  }
}

function getFrameStatus(key) {
  const frame = anchorData.frames[key];
  if (!frame || !frame.anchors) return 'empty';
  const placed = Object.keys(frame.anchors).length;
  if (placed >= ANCHOR_NAMES.length) return 'done';
  if (placed > 0) return 'partial';
  return 'empty';
}

function selectFrame(key) {
  currentFrame = key;
  ensureFrame(key);
  selectedAnchor = ANCHOR_NAMES[0];
  resetView();
  buildFrameList();
  buildAnchorLegend();
  draw();
  drawPreviews();
  updateStatus();
}

// ─── Anchor legend ──────────────────────────────────────────────────────
function buildAnchorLegend() {
  const legend = document.getElementById('anchorLegend');
  legend.innerHTML = '<div class="panel-section-label">Anchors</div>';

  for (const name of ANCHOR_NAMES) {
    const item = document.createElement('div');
    item.className = 'legend-item';

    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.style.background = ANCHOR_COLORS[name];

    const isPlaced = currentFrame && anchorData.frames[currentFrame]?.anchors?.[name];
    const label = document.createElement('span');
    label.textContent = name + (isPlaced ? '' : ' (unplaced)');
    label.style.fontWeight = name === selectedAnchor ? '700' : '400';

    item.appendChild(dot);
    item.appendChild(label);
    item.addEventListener('click', () => {
      selectedAnchor = name;
      buildAnchorLegend();
      draw();
    });
    legend.appendChild(item);
  }
}

// ─── View / zoom ────────────────────────────────────────────────────────
function resetView() {
  if (!currentFrame || !frameImages[currentFrame]) return;
  const img = frameImages[currentFrame];
  const wrapRect = canvasWrap.getBoundingClientRect();
  const fitZoom = Math.min(
    (wrapRect.width - 40) / img.width,
    (wrapRect.height - 40) / img.height
  );
  zoom = Math.max(1, Math.floor(fitZoom));
  if (img.width < 200) zoom = Math.max(zoom, 3);
  panX = 0;
  panY = 0;
  resizeCanvas();
}

const CANVAS_PAD = 80; // sprite-pixel padding around the sprite for overflow

function resizeCanvas() {
  if (!currentFrame || !frameImages[currentFrame]) return;
  const img = frameImages[currentFrame];
  mainCanvas.width = (img.width + CANVAS_PAD * 2) * zoom;
  mainCanvas.height = (img.height + CANVAS_PAD * 2) * zoom;
  document.getElementById('statusZoom').textContent = `Zoom: ${zoom}x`;
}

// ─── Main canvas drawing ────────────────────────────────────────────────
function drawCheckerboard(context, w, h) {
  const size = Math.max(8, zoom * 2);
  for (let y = 0; y < h; y += size) {
    for (let x = 0; x < w; x += size) {
      context.fillStyle = ((x / size + y / size) % 2 === 0) ? '#484440' : '#3e3a36';
      context.fillRect(x, y, size, size);
    }
  }
}

function draw() {
  if (!currentFrame || !frameImages[currentFrame]) {
    ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
    return;
  }

  const img = frameImages[currentFrame];
  ctx.resetTransform();
  ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);

  drawCheckerboard(ctx, mainCanvas.width, mainCanvas.height);

  // Draw a subtle outline of the sprite bounds so you can see what's "in frame"
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.strokeRect(CANVAS_PAD * zoom, CANVAS_PAD * zoom, img.width * zoom, img.height * zoom);

  ctx.translate(CANVAS_PAD * zoom, CANVAS_PAD * zoom);

  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(img, 0, 0, img.width * zoom, img.height * zoom);

  const frame = anchorData.frames[currentFrame];
  if (!frame || !frame.anchors) return;

  // Draw bones
  for (const [boneName, bone] of Object.entries(BONES)) {
    const from = frame.anchors[bone.from];
    const to = frame.anchors[bone.to];
    if (!from || !to) continue;

    ctx.beginPath();
    ctx.moveTo(from[0] * zoom, from[1] * zoom);
    ctx.lineTo(to[0] * zoom, to[1] * zoom);
    ctx.strokeStyle = BONE_COLORS[boneName];
    ctx.lineWidth = 4;
    ctx.globalAlpha = 0.7;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Draw placed items
  drawPlacedItemsOnMain();

  // Draw anchors
  for (const name of ANCHOR_NAMES) {
    const pos = frame.anchors[name];
    if (!pos) continue;

    const px = pos[0] * zoom;
    const py = pos[1] * zoom;
    const isSelected = name === selectedAnchor;
    const r = isSelected ? ANCHOR_RADIUS + 2 : ANCHOR_RADIUS;

    // Outer ring
    if (isSelected) {
      ctx.beginPath();
      ctx.arc(px, py, r + 2, 0, Math.PI * 2);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Filled circle
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fillStyle = ANCHOR_COLORS[name];
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Label
    ctx.font = '10px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.strokeText(name, px + r + 3, py + 3);
    ctx.fillText(name, px + r + 3, py + 3);
  }

  // Draw unplaced anchor indicators (in canvas-absolute coords, not affected by pad translate)
  const unplaced = ANCHOR_NAMES.filter(n => !frame.anchors[n]);
  if (unplaced.length > 0) {
    ctx.resetTransform();
    const startX = 8;
    const startY = 8;
    const lineH = 16;
    const bgH = 18 + unplaced.length * lineH;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.beginPath();
    if (ctx.roundRect) {
      ctx.roundRect(startX - 4, startY - 4, 110, bgH, 4);
    } else {
      ctx.rect(startX - 4, startY - 4, 110, bgH);
    }
    ctx.fill();
    ctx.font = 'bold 11px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText('Unplaced:', startX, startY + 10);
    let y = startY + 10 + lineH;
    for (const name of unplaced) {
      const isNext = name === selectedAnchor;
      ctx.beginPath();
      ctx.arc(startX + 5, y - 3, 4, 0, Math.PI * 2);
      if (isNext) {
        ctx.fillStyle = ANCHOR_COLORS[name];
        ctx.fill();
      } else {
        ctx.strokeStyle = ANCHOR_COLORS[name];
        ctx.lineWidth = 1.5;
        ctx.setLineDash([2, 2]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      ctx.font = isNext ? 'bold 11px sans-serif' : '11px sans-serif';
      ctx.fillStyle = isNext ? '#fff' : 'rgba(255,255,255,0.7)';
      ctx.fillText(name + (isNext ? ' <<' : ''), startX + 14, y);
      y += lineH;
    }
  }
}

function drawPlacedItemsOnMain() {
  if (placedItems.length === 0) return;
  const refAnchors = anchorData.frames['inventory-idle']?.anchors;
  if (!refAnchors) return;

  const isInvFrame = currentFrame === 'inventory-idle';
  const targetAnchors = isInvFrame ? refAnchors : anchorData.frames[currentFrame]?.anchors;
  if (!targetAnchors) return;

  for (let i = 0; i < placedItems.length; i++) {
    const item = placedItems[i];
    const itemImg = itemImages[item.id];
    if (!itemImg) continue;

    let x, y, rotation, drawScale;
    if (isInvFrame) {
      x = item.x;
      y = item.y;
      rotation = item.rotation;
      drawScale = item.scale;
    } else {
      const attachment = getItemAttachment(item);
      if (!attachment) continue;
      const refH = anchorData.frames['inventory-idle']?.height || 1;
      const targetH = anchorData.frames[currentFrame]?.height || 1;
      const t = transformAttachment(attachment, refAnchors, targetAnchors, targetH);
      x = t.x;
      y = t.y;
      rotation = t.rotation;
      drawScale = item.scale * (targetH / refH);
    }

    const px = x * zoom;
    const py = y * zoom;
    const iw = itemImg.width * drawScale * zoom;
    const ih = itemImg.height * drawScale * zoom;

    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(rotation * Math.PI / 180);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(itemImg, -iw/2, -ih/2, iw, ih);

    if (i === selectedItem && isInvFrame) {
      ctx.strokeStyle = '#c47030';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.strokeRect(-iw/2 - 2, -ih/2 - 2, iw + 4, ih + 4);
      ctx.setLineDash([]);
    }
    ctx.restore();
  }
}

function hitPlacedItem(sx, sy) {
  if (currentFrame !== 'inventory-idle') return -1;
  for (let i = placedItems.length - 1; i >= 0; i--) {
    const item = placedItems[i];
    const itemImg = itemImages[item.id];
    if (!itemImg) continue;
    const w = itemImg.width * item.scale;
    const h = itemImg.height * item.scale;
    const dx = sx - item.x;
    const dy = sy - item.y;
    const angle = -item.rotation * Math.PI / 180;
    const lx = dx * Math.cos(angle) - dy * Math.sin(angle);
    const ly = dx * Math.sin(angle) + dy * Math.cos(angle);
    if (Math.abs(lx) < w/2 && Math.abs(ly) < h/2) return i;
  }
  return -1;
}

// ─── Preview panel drawing ──────────────────────────────────────────────
function drawPreviews() {
  if (!currentFrame) return;

  const group = getWeaponGroup(currentFrame);
  const refFrameKey = currentFrame;

  for (const state of STATES) {
    const previewKey = group === 'inventory' ? 'inventory-idle' : `${group}-${state}`;
    const canvas = document.getElementById(`prev-${state}`);
    if (!canvas) continue;
    const pctx = canvas.getContext('2d');
    if (group === 'inventory' && state !== 'idle') {
      const wrap = canvas.parentElement;
      canvas.width = wrap.clientWidth;
      canvas.height = wrap.clientHeight - 20;
      pctx.clearRect(0, 0, canvas.width, canvas.height);
      pctx.fillStyle = '#999';
      pctx.font = '10px sans-serif';
      pctx.textAlign = 'center';
      pctx.fillText('N/A', canvas.width/2, canvas.height/2);
      continue;
    }

    const wrap = canvas.parentElement;
    canvas.width = wrap.clientWidth;
    canvas.height = wrap.clientHeight - 20;
    pctx.clearRect(0, 0, canvas.width, canvas.height);

    const img = frameImages[previewKey];
    if (!img) continue;

    const scale = Math.min(
      (canvas.width - 8) / img.width,
      (canvas.height - 8) / img.height,
      4
    );
    const dx = (canvas.width - img.width * scale) / 2;
    const dy = (canvas.height - img.height * scale) / 2;

    pctx.imageSmoothingEnabled = false;
    pctx.drawImage(img, dx, dy, img.width * scale, img.height * scale);

    // Draw placed items on preview, transformed via bones
    const refAnchors = anchorData.frames['inventory-idle']?.anchors;
    const targetAnchors = anchorData.frames[previewKey]?.anchors;
    if (refAnchors && targetAnchors) {
      for (const item of placedItems) {
        const itemImg = itemImages[item.id];
        if (!itemImg) continue;
        const attachment = getItemAttachment(item);
        if (!attachment) continue;
        const refH = anchorData.frames['inventory-idle']?.height || 1;
        const targetH = anchorData.frames[previewKey]?.height || 1;
        const transformed = transformAttachment(attachment, refAnchors, targetAnchors, targetH);

        const ix = dx + transformed.x * scale;
        const iy = dy + transformed.y * scale;
        const iScale = scale * attachment.scale * (targetH / refH);
        const iw = itemImg.width * iScale;
        const ih = itemImg.height * iScale;

        pctx.save();
        pctx.translate(ix, iy);
        pctx.rotate(transformed.rotation * Math.PI / 180);
        pctx.drawImage(itemImg, -iw/2, -ih/2, iw, ih);
        pctx.restore();
      }
    }

    // Draw anchor dots on preview
    if (targetAnchors) {
      for (const name of ANCHOR_NAMES) {
        const pos = targetAnchors[name];
        if (!pos) continue;
        const px = dx + pos[0] * scale;
        const py = dy + pos[1] * scale;
        pctx.beginPath();
        pctx.arc(px, py, 2, 0, Math.PI * 2);
        pctx.fillStyle = ANCHOR_COLORS[name];
        pctx.fill();
      }
    }
  }
}

function getWeaponGroup(frameKey) {
  return parseFrameKey(frameKey).group;
}

function getItemAttachment(item) {
  const invFrame = anchorData.frames['inventory-idle'];
  if (!invFrame || !invFrame.anchors) return null;
  const att = computeAttachment(item.x, item.y, invFrame.anchors, invFrame.height || 1);
  return {
    ...att,
    scale: item.scale,
    rotation: item.rotation,
  };
}

// ─── Bone transform ────────────────────────────────────────────────────
function boneAngle(anchors, bone) {
  const from = anchors[bone.from];
  const to = anchors[bone.to];
  if (!from || !to) return 0;
  return Math.atan2(to[1] - from[1], to[0] - from[0]);
}

function boneLength(anchors, bone) {
  const from = anchors[bone.from];
  const to = anchors[bone.to];
  if (!from || !to) return 1;
  const dx = to[0] - from[0];
  const dy = to[1] - from[1];
  return Math.sqrt(dx * dx + dy * dy);
}

function distToSegment(px, py, ax, ay, bx, by) {
  const dx = bx - ax;
  const dy = by - ay;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) {
    return { dist: Math.hypot(px - ax, py - ay), t: 0 };
  }
  let t = ((px - ax) * dx + (py - ay) * dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  const projX = ax + t * dx;
  const projY = ay + t * dy;
  return { dist: Math.hypot(px - projX, py - projY), t };
}

function computeAttachment(itemX, itemY, anchors, refHeight) {
  let bestBone = 'spine';
  let bestDist = Infinity;
  let bestAlong = 0;
  let bestPerp = 0;
  let bestEnd = 'from';

  for (const [boneName, bone] of Object.entries(BONES)) {
    const from = anchors[bone.from];
    const to = anchors[bone.to];
    if (!from || !to) continue;
    const { dist } = distToSegment(itemX, itemY, from[0], from[1], to[0], to[1]);
    if (dist < bestDist) {
      bestDist = dist;
      bestBone = boneName;
      const angle = boneAngle(anchors, bone);
      // Pick the closer endpoint as the anchor
      const dFrom = Math.hypot(itemX - from[0], itemY - from[1]);
      const dTo = Math.hypot(itemX - to[0], itemY - to[1]);
      const anchor = dFrom <= dTo ? from : to;
      bestEnd = dFrom <= dTo ? 'from' : 'to';
      const offX = itemX - anchor[0];
      const offY = itemY - anchor[1];
      // Bone-local: +along is toward the other endpoint, perp is right-normal
      const sign = bestEnd === 'from' ? 1 : -1;
      bestAlong = (offX * Math.cos(angle) + offY * Math.sin(angle)) * sign;
      bestPerp = (-offX * Math.sin(angle) + offY * Math.cos(angle)) * sign;
      // Normalize by reference frame height so scale is consistent across sprites
      bestAlong /= refHeight;
      bestPerp /= refHeight;
    }
  }
  return {
    boneName: bestBone,
    attachEnd: bestEnd,
    localOffsetAlong: bestAlong,
    localOffsetPerp: bestPerp,
  };
}

function transformAttachment(attachment, refAnchors, targetAnchors, targetHeight) {
  const bone = BONES[attachment.boneName];
  if (!bone) return { x: 0, y: 0, rotation: 0 };

  const end = attachment.attachEnd === 'to' ? bone.to : bone.from;
  const refAnchor = refAnchors[end];
  const targetAnchor = targetAnchors[end];
  if (!refAnchor || !targetAnchor) return { x: 0, y: 0, rotation: 0 };

  const refAngle = boneAngle(refAnchors, bone);
  const targetAngle = boneAngle(targetAnchors, bone);
  const sign = attachment.attachEnd === 'from' ? 1 : -1;

  // Denormalize offsets using TARGET frame height so item position scales with sprite
  const along = attachment.localOffsetAlong * targetHeight * sign;
  const perp = attachment.localOffsetPerp * targetHeight * sign;

  const offX = Math.cos(targetAngle) * along - Math.sin(targetAngle) * perp;
  const offY = Math.sin(targetAngle) * along + Math.cos(targetAngle) * perp;

  const angleDelta = targetAngle - refAngle;

  return {
    x: targetAnchor[0] + offX,
    y: targetAnchor[1] + offY,
    rotation: attachment.rotation + angleDelta * (180 / Math.PI),
  };
}

// ─── Canvas interaction ─────────────────────────────────────────────────
function canvasToSprite(e) {
  const rect = mainCanvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (mainCanvas.width / rect.width) / zoom - CANVAS_PAD,
    y: (e.clientY - rect.top) * (mainCanvas.height / rect.height) / zoom - CANVAS_PAD,
  };
}

function hitAnchor(sx, sy) {
  if (!currentFrame) return null;
  const frame = anchorData.frames[currentFrame];
  if (!frame || !frame.anchors) return null;

  const hitR = ANCHOR_HIT_RADIUS / zoom;
  let closest = null;
  let closestDist = Infinity;

  for (const name of ANCHOR_NAMES) {
    const pos = frame.anchors[name];
    if (!pos) continue;
    const dx = sx - pos[0];
    const dy = sy - pos[1];
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < hitR && dist < closestDist) {
      closest = name;
      closestDist = dist;
    }
  }
  return closest;
}

mainCanvas.addEventListener('mousedown', e => {
  if (e.button === 1 || (e.button === 0 && e.altKey)) {
    isPanning = true;
    panStart = { x: e.clientX, y: e.clientY, px: panX, py: panY };
    mainCanvas.style.cursor = 'grabbing';
    return;
  }

  if (e.button !== 0) return;
  const sp = canvasToSprite(e);
  const hit = hitAnchor(sp.x, sp.y);

  if (hit) {
    selectedAnchor = hit;
    draggingAnchor = hit;
    buildAnchorLegend();
    draw();
    return;
  }

  const itemHit = hitPlacedItem(sp.x, sp.y);
  if (itemHit >= 0) {
    selectedItem = itemHit;
    const item = placedItems[itemHit];
    draggingItem = { index: itemHit, offX: sp.x - item.x, offY: sp.y - item.y };
    draw();
    return;
  }

  if (currentFrame === 'inventory-idle') {
    selectedItem = -1;
    draw();
  }

  if (selectedAnchor && currentFrame) {
    ensureFrame(currentFrame);
    anchorData.frames[currentFrame].anchors[selectedAnchor] = [
      Math.round(sp.x * 10) / 10,
      Math.round(sp.y * 10) / 10
    ];
    markUnsaved();

    const nextUnplaced = ANCHOR_NAMES.find(
      n => !anchorData.frames[currentFrame].anchors[n] && n !== selectedAnchor
    );
    if (nextUnplaced) {
      selectedAnchor = nextUnplaced;
    }

    buildAnchorLegend();
    buildFrameList();
    draw();
    drawPreviews();
  }
});

mainCanvas.addEventListener('mousemove', e => {
  if (isPanning) {
    panX = panStart.px + (e.clientX - panStart.x);
    panY = panStart.py + (e.clientY - panStart.y);
    mainCanvas.style.transform = `translate(${panX}px, ${panY}px)`;
    return;
  }

  const sp = canvasToSprite(e);
  document.getElementById('statusCursor').textContent =
    `Pos: ${Math.round(sp.x)}, ${Math.round(sp.y)}`;

  if (draggingAnchor && currentFrame) {
    ensureFrame(currentFrame);
    anchorData.frames[currentFrame].anchors[draggingAnchor] = [
      Math.round(sp.x * 10) / 10,
      Math.round(sp.y * 10) / 10
    ];
    markUnsaved();
    draw();
    drawPreviews();
    return;
  }

  if (draggingItem) {
    const item = placedItems[draggingItem.index];
    item.x = sp.x - draggingItem.offX;
    item.y = sp.y - draggingItem.offY;
    saveItemsToStorage();
    draw();
    drawPreviews();
    return;
  }

  const hit = hitAnchor(sp.x, sp.y);
  const itemHit = hitPlacedItem(sp.x, sp.y);
  mainCanvas.style.cursor = hit || itemHit >= 0 ? 'grab' : 'crosshair';
  document.getElementById('statusAnchor').textContent =
    hit ? `Anchor: ${hit}` : (selectedAnchor ? `Placing: ${selectedAnchor}` : '');
});

mainCanvas.addEventListener('mouseup', () => {
  if (isPanning) {
    isPanning = false;
    mainCanvas.style.cursor = 'crosshair';
    return;
  }
  if (draggingAnchor) {
    draggingAnchor = null;
    buildFrameList();
  }
  if (draggingItem) {
    draggingItem = null;
  }
});

mainCanvas.addEventListener('wheel', e => {
  // Scale selected item with shift+wheel, rotate with ctrl+wheel
  if (selectedItem >= 0 && currentFrame === 'inventory-idle' && (e.shiftKey || e.ctrlKey)) {
    e.preventDefault();
    const item = placedItems[selectedItem];
    if (e.shiftKey) {
      const delta = e.deltaY < 0 ? 1.1 : 1/1.1;
      item.scale = Math.max(0.05, Math.min(3, item.scale * delta));
    } else {
      item.rotation += e.deltaY < 0 ? 5 : -5;
    }
    saveItemsToStorage();
    draw();
    drawPreviews();
    return;
  }

  e.preventDefault();
  const oldZoom = zoom;
  if (e.deltaY < 0) {
    zoom = Math.min(20, zoom + 1);
  } else {
    zoom = Math.max(1, zoom - 1);
  }
  if (zoom !== oldZoom) {
    resizeCanvas();
    draw();
  }
}, { passive: false });

// ─── Keyboard ───────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    e.preventDefault();
    navigateFrame(1);
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault();
    navigateFrame(-1);
  } else if (e.key === 'Tab') {
    e.preventDefault();
    cycleAnchor(e.shiftKey ? -1 : 1);
  } else if (e.key === 'Delete' || e.key === 'Backspace') {
    if (selectedItem >= 0) {
      placedItems.splice(selectedItem, 1);
      selectedItem = -1;
      saveItemsToStorage();
      draw();
      drawPreviews();
      return;
    }
    if (selectedAnchor && currentFrame) {
      const frame = anchorData.frames[currentFrame];
      if (frame?.anchors?.[selectedAnchor]) {
        delete frame.anchors[selectedAnchor];
        markUnsaved();
        buildAnchorLegend();
        buildFrameList();
        draw();
        drawPreviews();
      }
    }
  }
});

function navigateFrame(dir) {
  if (!currentFrame || frameKeys.length === 0) return;
  const idx = frameKeys.indexOf(currentFrame);
  const next = idx + dir;
  if (next >= 0 && next < frameKeys.length) {
    selectFrame(frameKeys[next]);
  }
}

function cycleAnchor(dir) {
  const idx = selectedAnchor ? ANCHOR_NAMES.indexOf(selectedAnchor) : -1;
  let next = (idx + dir + ANCHOR_NAMES.length) % ANCHOR_NAMES.length;
  selectedAnchor = ANCHOR_NAMES[next];
  buildAnchorLegend();
  draw();
}

// ─── Data management ────────────────────────────────────────────────────
function defaultAnchors(w, h) {
  const cx = w * 0.5;
  return {
    head:       [cx,        h * 0.12],
    chest:      [cx,        h * 0.35],
    r_shoulder: [cx + w * 0.15, h * 0.30],
    l_shoulder: [cx - w * 0.15, h * 0.30],
    belt:       [cx,        h * 0.50],
    r_hip:      [cx + w * 0.10, h * 0.55],
    l_hip:      [cx - w * 0.10, h * 0.55],
    r_hand:     [cx + w * 0.30, h * 0.48],
    l_hand:     [cx - w * 0.30, h * 0.48],
    r_foot:     [cx + w * 0.12, h * 0.90],
    l_foot:     [cx - w * 0.12, h * 0.90],
  };
}

function ensureFrame(key) {
  if (!anchorData.frames[key]) {
    const img = frameImages[key];
    const w = img?.width || 100;
    const h = img?.height || 100;
    anchorData.frames[key] = {
      width: w,
      height: h,
      anchors: defaultAnchors(w, h),
    };
  }
  if (!anchorData.frames[key].anchors || Object.keys(anchorData.frames[key].anchors).length === 0) {
    const w = anchorData.frames[key].width || 100;
    const h = anchorData.frames[key].height || 100;
    anchorData.frames[key].anchors = defaultAnchors(w, h);
  }
}

function markUnsaved() {
  unsaved = true;
  unsavedDot.classList.add('visible');
  saveToLocalStorage();
}

function markSaved() {
  unsaved = false;
  unsavedDot.classList.remove('visible');
}

function saveToLocalStorage() {
  try {
    localStorage.setItem(`anchor-editor-${charPath}`, JSON.stringify(anchorData));
  } catch(e) {}
}

function loadFromLocalStorage() {
  try {
    const stored = localStorage.getItem(`anchor-editor-${charPath}`);
    if (stored) {
      const parsed = JSON.parse(stored);
      if (parsed.frames && Object.keys(parsed.frames).length > 0) {
        return parsed;
      }
    }
  } catch(e) {}
  return null;
}

function buildExportData() {
  const out = {
    version: 1,
    character: charPath,
    anchors: {},
    bones: BONES,
    frames: {},
  };

  for (const name of ANCHOR_NAMES) {
    out.anchors[name] = {};
  }

  for (const key of frameKeys) {
    const frame = anchorData.frames[key];
    if (!frame) continue;
    out.frames[key] = {
      width: frame.width || frameImages[key]?.width || 0,
      height: frame.height || frameImages[key]?.height || 0,
      anchors: { ...frame.anchors },
    };
  }

  return out;
}

// ─── Save / Load ────────────────────────────────────────────────────────
document.getElementById('clearItemsBtn').addEventListener('click', () => {
  if (placedItems.length === 0) return;
  if (confirm(`Remove all ${placedItems.length} placed items?`)) {
    clearPlacedItems();
  }
});

document.getElementById('saveBtn').addEventListener('click', async () => {
  const data = buildExportData();
  try {
    const res = await fetch(`${BASE_URL}/${charPath}/anchors.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data, null, 2),
    });
    if (res.ok) {
      markSaved();
      alert('Saved successfully!');
    } else {
      alert('Save failed (server returned ' + res.status + '). Use Download instead if not running a write-capable server.');
    }
  } catch(e) {
    alert('Save failed (network error). Use Download instead.\n' + e.message);
  }
});

document.getElementById('downloadBtn').addEventListener('click', () => {
  const data = buildExportData();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'anchors.json';
  a.click();
  URL.revokeObjectURL(url);
  markSaved();
});

document.getElementById('downloadAllBtn').addEventListener('click', () => {
  for (const key of frameKeys) {
    ensureFrame(key);
  }
  const data = buildExportData();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'anchors.json';
  a.click();
  URL.revokeObjectURL(url);
  markSaved();
});

async function loadAnchorsJson() {
  try {
    const res = await fetch(`${BASE_URL}/${charPath}/anchors.json`);
    if (res.ok) {
      const data = await res.json();
      return data;
    }
  } catch(e) {}
  return null;
}

// ─── Copy anchors modal ────────────────────────────────────────────────
document.getElementById('copyAnchorsBtn').addEventListener('click', () => {
  if (!currentFrame) return;
  const select = document.getElementById('copySource');
  select.innerHTML = '';
  for (const key of frameKeys) {
    if (key === currentFrame) continue;
    const frame = anchorData.frames[key];
    if (!frame?.anchors || Object.keys(frame.anchors).length === 0) continue;
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = `${key} (${Object.keys(frame.anchors).length} anchors)`;
    select.appendChild(opt);
  }
  if (select.options.length === 0) {
    alert('No other frames with anchors to copy from.');
    return;
  }
  document.getElementById('copyModal').classList.add('visible');
});

document.getElementById('copyCancel').addEventListener('click', () => {
  document.getElementById('copyModal').classList.remove('visible');
});

document.getElementById('copyConfirm').addEventListener('click', () => {
  const sourceKey = document.getElementById('copySource').value;
  if (!sourceKey || !currentFrame) return;
  const source = anchorData.frames[sourceKey];
  if (!source?.anchors) return;

  ensureFrame(currentFrame);
  anchorData.frames[currentFrame].anchors = { ...source.anchors };
  markUnsaved();
  buildAnchorLegend();
  buildFrameList();
  draw();
  drawPreviews();
  document.getElementById('copyModal').classList.remove('visible');
});

// ─── Status ─────────────────────────────────────────────────────────────
function updateStatus() {
  document.getElementById('statusFrame').textContent =
    currentFrame ? `Frame: ${currentFrame}` : 'No frame loaded';
  document.getElementById('statusZoom').textContent = `Zoom: ${zoom}x`;
  const frame = anchorData.frames[currentFrame];
  const placed = frame?.anchors ? Object.keys(frame.anchors).length : 0;
  document.getElementById('statusAnchor').textContent =
    `Placed: ${placed}/${ANCHOR_NAMES.length}`;
}

// ─── Init ───────────────────────────────────────────────────────────────
document.getElementById('loadBtn').addEventListener('click', () => {
  charPath = document.getElementById('charPath').value.trim();
  init();
});

document.getElementById('charPath').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    charPath = e.target.value.trim();
    init();
  }
});

async function init() {
  frameImages = {};
  frameKeys = [];
  currentFrame = null;
  selectedAnchor = ANCHOR_NAMES[0];
  placedItems = [];
  selectedItem = -1;
  loadItemsFromStorage();

  anchorData = { version: 1, character: charPath, bones: BONES, frames: {} };

  frameKeys = await discoverFrames(charPath);

  if (frameKeys.length === 0) {
    alert(`No sprite files found for character "${charPath}" at ${BASE_URL}/${charPath}/`);
    return;
  }

  const serverData = await loadAnchorsJson();
  const localData = loadFromLocalStorage();

  if (serverData && localData) {
    const serverCount = Object.values(serverData.frames || {})
      .reduce((sum, f) => sum + Object.keys(f.anchors || {}).length, 0);
    const localCount = Object.values(localData.frames || {})
      .reduce((sum, f) => sum + Object.keys(f.anchors || {}).length, 0);

    if (localCount > serverCount) {
      const use = confirm(
        `Found local backup with more anchor data (${localCount} vs ${serverCount} on disk). Use local backup?`
      );
      anchorData = use ? localData : serverData;
    } else {
      anchorData = serverData;
    }
  } else if (serverData) {
    anchorData = serverData;
  } else if (localData) {
    anchorData = localData;
  }

  anchorData.bones = BONES;
  anchorData.character = charPath;

  for (const key of frameKeys) {
    if (anchorData.frames[key]) {
      const img = frameImages[key];
      if (img) {
        anchorData.frames[key].width = img.width;
        anchorData.frames[key].height = img.height;
      }
    }
  }

  selectFrame(frameKeys[0]);
  markSaved();

  await loadItemSprites();
}

window.addEventListener('resize', () => {
  draw();
  drawPreviews();
});

init();
</script>
</body>
</html>
