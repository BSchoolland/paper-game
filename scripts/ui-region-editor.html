<!DOCTYPE html>
<html>
<head>
<title>UI Region Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1e1e1e; color: #eee; font-family: monospace; display: flex; flex-direction: column; height: 100vh; }
  #toolbar { padding: 8px 12px; background: #2d2d2d; display: flex; gap: 12px; align-items: center; border-bottom: 1px solid #444; }
  #toolbar button { background: #444; color: #eee; border: 1px solid #666; padding: 4px 12px; cursor: pointer; font-family: monospace; }
  #toolbar button:hover { background: #555; }
  #toolbar label { cursor: pointer; background: #3a6; color: #fff; padding: 4px 12px; border: 1px solid #4b7; }
  #toolbar label:hover { background: #4b7; }
  #canvas-wrap { flex: 1; overflow: auto; position: relative; display: flex; justify-content: center; align-items: flex-start; padding: 20px; }
  canvas { cursor: crosshair; border: 1px solid #444; }
  #regions-panel { width: 280px; position: fixed; right: 0; top: 41px; bottom: 0; background: #252525; border-left: 1px solid #444; overflow-y: auto; padding: 8px; }
  #regions-panel h3 { margin-bottom: 8px; font-size: 13px; color: #aaa; }
  .region-item { padding: 4px 6px; margin-bottom: 2px; background: #333; font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
  .region-item:hover { background: #3a3a3a; }
  .region-item .delete { color: #a55; cursor: pointer; padding: 0 4px; }
  .region-item .delete:hover { color: #f77; }
  #status { padding: 4px 12px; background: #2d2d2d; border-top: 1px solid #444; font-size: 12px; color: #888; }
</style>
</head>
<body>

<div id="toolbar">
  <label><input type="file" id="file-input" accept="image/*" hidden>Load Image</label>
  <button id="export-btn" disabled>Export JSON</button>
  <button id="undo-btn" disabled>Undo</button>
  <button id="clear-btn" disabled>Clear All</button>
  <span id="filename" style="color:#888; margin-left:12px;"></span>
</div>

<div style="display:flex; flex:1; overflow:hidden;">
  <div id="canvas-wrap">
    <canvas id="canvas" width="800" height="600"></canvas>
  </div>
  <div id="regions-panel">
    <h3>Regions</h3>
    <div id="regions-list"></div>
  </div>
</div>

<div id="status">Load an image to begin</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const fileInput = document.getElementById('file-input');
const exportBtn = document.getElementById('export-btn');
const undoBtn = document.getElementById('undo-btn');
const clearBtn = document.getElementById('clear-btn');
const filenameSpan = document.getElementById('filename');
const status = document.getElementById('status');
const regionsList = document.getElementById('regions-list');

let img = null;
let regions = [];
let drawing = false;
let startX = 0, startY = 0;
let currentX = 0, currentY = 0;
let loadedFilename = '';

const colors = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#e84393'];

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  loadedFilename = file.name.replace(/\.[^.]+$/, '');
  filenameSpan.textContent = file.name;
  const reader = new FileReader();
  reader.onload = (ev) => {
    img = new Image();
    img.onload = () => {
      canvas.width = img.width;
      canvas.height = img.height;
      regions = [];
      draw();
      updateUI();
      status.textContent = `${img.width}x${img.height} — click and drag to define regions`;
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

canvas.addEventListener('mousedown', (e) => {
  if (!img) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  startX = Math.round((e.clientX - rect.left) * scaleX);
  startY = Math.round((e.clientY - rect.top) * scaleY);
  drawing = true;
});

canvas.addEventListener('mousemove', (e) => {
  if (!img) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  currentX = Math.round((e.clientX - rect.left) * scaleX);
  currentY = Math.round((e.clientY - rect.top) * scaleY);
  if (drawing) draw();
  status.textContent = `${currentX}, ${currentY}` + (drawing ? ` — dragging from (${startX}, ${startY})` : '');
});

canvas.addEventListener('mouseup', (e) => {
  if (!drawing) return;
  drawing = false;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const endX = Math.round((e.clientX - rect.left) * scaleX);
  const endY = Math.round((e.clientY - rect.top) * scaleY);

  const x = Math.min(startX, endX);
  const y = Math.min(startY, endY);
  const w = Math.abs(endX - startX);
  const h = Math.abs(endY - startY);

  if (w < 3 || h < 3) return;

  regions.push({ name: `region_${x}_${y}`, x, y, w, h });
  draw();
  updateUI();
});

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (img) ctx.drawImage(img, 0, 0);

  regions.forEach((r, i) => {
    const color = colors[i % colors.length];
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.strokeRect(r.x, r.y, r.w, r.h);
    ctx.fillStyle = color + '33';
    ctx.fillRect(r.x, r.y, r.w, r.h);
    ctx.fillStyle = color;
    ctx.font = '12px monospace';
    ctx.fillText(r.name, r.x + 4, r.y + 14);
  });

  if (drawing) {
    const x = Math.min(startX, currentX);
    const y = Math.min(startY, currentY);
    const w = Math.abs(currentX - startX);
    const h = Math.abs(currentY - startY);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.strokeRect(x, y, w, h);
    ctx.setLineDash([]);
  }
}

function updateUI() {
  exportBtn.disabled = regions.length === 0;
  undoBtn.disabled = regions.length === 0;
  clearBtn.disabled = regions.length === 0;

  regionsList.innerHTML = '';
  regions.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'region-item';
    div.innerHTML = `<span>${r.name} (${r.w}x${r.h})</span><span class="delete" data-i="${i}">x</span>`;
    regionsList.appendChild(div);
  });
}

regionsList.addEventListener('click', (e) => {
  if (e.target.classList.contains('delete')) {
    regions.splice(parseInt(e.target.dataset.i), 1);
    draw();
    updateUI();
  }
});

undoBtn.addEventListener('click', () => {
  regions.pop();
  draw();
  updateUI();
});

clearBtn.addEventListener('click', () => {
  regions = [];
  draw();
  updateUI();
});

exportBtn.addEventListener('click', () => {
  const output = {
    image: loadedFilename,
    regions: regions.map(r => ({ name: r.name, x: r.x, y: r.y, w: r.w, h: r.h }))
  };
  const json = JSON.stringify(output, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${loadedFilename}-regions.json`;
  a.click();
  URL.revokeObjectURL(url);
  status.textContent = `Exported ${regions.length} regions to ${a.download}`;
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'z' && (e.ctrlKey || e.metaKey)) { undoBtn.click(); e.preventDefault(); }
});

// Auto-load image from ?image= query parameter (relative to the served root)
const params = new URLSearchParams(window.location.search);
const imageParam = params.get('image');
if (imageParam) {
  loadedFilename = imageParam.split('/').pop().replace(/\.[^.]+$/, '');
  filenameSpan.textContent = imageParam;
  img = new Image();
  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    regions = [];

    // Auto-load existing regions from ?regions= query parameter
    const regionsParam = params.get('regions');
    if (regionsParam) {
      fetch(regionsParam)
        .then(r => r.json())
        .then(data => {
          if (data.regions) regions = data.regions;
          draw();
          updateUI();
          status.textContent = `${img.width}x${img.height} — loaded ${regions.length} existing regions`;
        })
        .catch(() => {
          draw();
          updateUI();
          status.textContent = `${img.width}x${img.height} — click and drag to define regions`;
        });
    } else {
      draw();
      updateUI();
      status.textContent = `${img.width}x${img.height} — click and drag to define regions`;
    }
  };
  img.src = imageParam;
}
</script>
</body>
</html>
